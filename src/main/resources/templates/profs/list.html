<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: pageHead('Professeurs')}"></head>
<body>

<div class="layout">
    <nav th:replace="~{fragments/layout :: navbar('profs')}"></nav>

    <main class="container">

        <div class="page-header">
            <h1><span class="float" style="display:inline-block">👩‍🏫</span> Les Professeurs</h1>
            <p class="subtitle">L'équipe enseignante de l'école</p>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div style="text-align:right; margin-bottom: 1rem;">
            <a th:href="@{/profs/new}" class="btn btn-primary">
                <span>➕</span> Nouveau professeur
            </a>
        </div>

        <div th:if="${profs.isEmpty()}" class="card empty">
            <span class="empty-emoji">🎭</span>
            <p class="empty-text">Aucun professeur enregistré pour le moment</p>
        </div>

        <div th:unless="${profs.isEmpty()}" class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>🆔</th>
                    <th>Nom</th>
                    <th>Spécialité</th>
                    <th style="text-align:right;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${profs}">
                    <td th:text="${p.id}">1</td>
                    <td><strong th:text="${p.nom}">Nom</strong></td>
                    <td>
                        <span class="badge purple" th:text="${p.specialite}">Spécialité</span>
                    </td>
                    <td style="text-align:right;">
                        <div class="btn-group" style="justify-content:flex-end;">
                            <a th:href="@{'/profs/' + ${p.id} + '/edit'}" class="btn btn-sm btn-secondary">✏️</a>
                            <form th:action="@{'/profs/' + ${p.id} + '/delete'}" method="post" style="display:inline;"
                                  onsubmit="return confirm('Supprimer ce professeur ?');">
                                <button type="submit" class="btn btn-sm btn-danger">🗑️</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

</body>
</html>
