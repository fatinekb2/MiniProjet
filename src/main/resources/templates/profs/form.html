<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: pageHead('Professeur')}"></head>
<body>

<div class="layout">
    <nav th:replace="~{fragments/layout :: navbar('profs')}"></nav>

    <main class="container">

        <div class="page-header">
            <h1>
                <span th:if="${isEdit}">✏️ Modifier le professeur</span>
                <span th:unless="${isEdit}">✨ Nouveau professeur</span>
            </h1>
            <p class="subtitle">Renseignez les informations du professeur</p>
        </div>

        <form class="form-card" th:action="@{/profs/save}" th:object="${prof}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div class="form-grid">
                <div class="form-group full">
                    <label for="nom"><span>🧑</span> Nom complet</label>
                    <input type="text" id="nom" th:field="*{nom}" placeholder="Ex: Marie Dupont"/>
                    <div class="field-error" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
                </div>

                <div class="form-group full">
                    <label for="specialite"><span>🎯</span> Spécialité</label>
                    <input type="text" id="specialite" th:field="*{specialite}" placeholder="Ex: Piano, Guitare, Violon, Chant..."/>
                    <div class="field-error" th:if="${#fields.hasErrors('specialite')}" th:errors="*{specialite}"></div>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/profs}" class="btn btn-secondary"><span>↩️</span> Annuler</a>
                <button type="submit" class="btn btn-primary">
                    <span th:if="${isEdit}">💾 Mettre à jour</span>
                    <span th:unless="${isEdit}">✨ Créer</span>
                </button>
            </div>
        </form>

    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

</body>
</html>
