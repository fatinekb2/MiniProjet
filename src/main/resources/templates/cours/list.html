<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: pageHead('Cours')}"></head>
<body>

<div class="layout">
    <nav th:replace="~{fragments/layout :: navbar('cours')}"></nav>

    <main class="container">

        <div class="page-header">
            <h1><span class="float" style="display:inline-block">📅</span> Planning des Cours</h1>
            <p class="subtitle">Tous les cours de la semaine, filtrables par niveau et jour</p>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <!-- Filtres -->
        <form class="filters" method="get" th:action="@{/cours}">
            <div class="filters-title"><span>🔍</span> Filtrer</div>
            <div class="form-group">
                <label for="niveau">Niveau</label>
                <select id="niveau" name="niveau">
                    <option value="">Tous les niveaux</option>
                    <option th:each="n : ${niveaux}"
                            th:value="${n}"
                            th:text="${n}"
                            th:selected="${niveau == n}"></option>
                </select>
            </div>
            <div class="form-group">
                <label for="jour">Jour</label>
                <select id="jour" name="jour">
                    <option value="">Tous les jours</option>
                    <option th:each="j : ${jours}"
                            th:value="${j}"
                            th:text="${j}"
                            th:selected="${jour == j}"></option>
                </select>
            </div>
            <div style="display:flex; gap:0.6rem;">
                <button type="submit" class="btn btn-primary"><span>✨</span> Appliquer</button>
                <a th:href="@{/cours}" class="btn btn-secondary"><span>↺</span> Réinitialiser</a>
            </div>
        </form>

        <div style="text-align:right; margin-bottom: 1rem;">
            <a th:href="@{/cours/new}" class="btn btn-primary">
                <span>➕</span> Planifier un cours
            </a>
        </div>

        <div th:if="${cours.isEmpty()}" class="card empty">
            <span class="empty-emoji">🎼</span>
            <p class="empty-text">Aucun cours trouvé pour ces critères</p>
        </div>

        <div th:unless="${cours.isEmpty()}" class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>🆔</th>
                    <th>Jour</th>
                    <th>Heure</th>
                    <th>Durée</th>
                    <th>Niveau</th>
                    <th>Professeur</th>
                    <th style="text-align:right;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${cours}">
                    <td th:text="${c.id}">1</td>
                    <td><span class="badge info" th:text="${c.jour}">Jour</span></td>
                    <td>
                        <strong th:text="${#temporals.format(c.heureDebut, 'HH:mm')}">10:00</strong>
                    </td>
                    <td>
                        <span class="badge warn" th:text="${c.dureeMin} + ' min'">60 min</span>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${c.niveau == 'Debutant' ? 'success' :
                                              (c.niveau == 'Intermediaire' ? 'info' :
                                              (c.niveau == 'Avance' ? 'purple' : 'danger'))}"
                              th:text="${c.niveau}">Niveau</span>
                    </td>
                    <td>
                        <span th:if="${c.prof != null}">
                            👩‍🏫 <strong th:text="${c.prof.nom}">Nom</strong>
                            <span style="opacity:0.7; font-size:0.9rem;" th:text="'(' + ${c.prof.specialite} + ')'">spé</span>
                        </span>
                        <span th:if="${c.prof == null}" style="opacity:0.5;">— Non assigné —</span>
                    </td>
                    <td style="text-align:right;">
                        <div class="btn-group" style="justify-content:flex-end;">
                            <a th:href="@{'/cours/' + ${c.id} + '/edit'}" class="btn btn-sm btn-secondary">✏️</a>
                            <form th:action="@{'/cours/' + ${c.id} + '/delete'}" method="post" style="display:inline;"
                                  onsubmit="return confirm('Supprimer ce cours ?');">
                                <button type="submit" class="btn btn-sm btn-danger">🗑️</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

</body>
</html>
