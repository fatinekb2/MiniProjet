<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: pageHead('Instruments')}"></head>
<body>

<div class="layout">
    <nav th:replace="~{fragments/layout :: navbar('instruments')}"></nav>

    <main class="container">

        <div class="page-header">
            <h1><span class="float" style="display:inline-block">🎸</span> Les Instruments</h1>
            <p class="subtitle">Tous les instruments de l'école et leur disponibilité</p>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <!-- Filtres -->
        <form class="filters" method="get" th:action="@{/instruments}">
            <div class="filters-title">
                <span>🔍</span> Filtrer
            </div>
            <div class="form-group">
                <label for="famille">Famille</label>
                <select id="famille" name="famille">
                    <option value="">Toutes les familles</option>
                    <option value="Cordes"      th:selected="${famille == 'Cordes'}">🎻 Cordes</option>
                    <option value="Vents"       th:selected="${famille == 'Vents'}">🎺 Vents</option>
                    <option value="Percussions" th:selected="${famille == 'Percussions'}">🥁 Percussions</option>
                    <option value="Claviers"    th:selected="${famille == 'Claviers'}">🎹 Claviers</option>
                </select>
            </div>
            <div class="form-group">
                <label for="disponibilite">Disponibilité</label>
                <select id="disponibilite" name="disponibilite">
                    <option value="">Peu importe</option>
                    <option value="true"  th:selected="${disponibilite != null and disponibilite}">✅ Disponible</option>
                    <option value="false" th:selected="${disponibilite != null and !disponibilite}">🚫 Indisponible</option>
                </select>
            </div>
            <div style="display:flex; gap:0.6rem;">
                <button type="submit" class="btn btn-primary"><span>✨</span> Appliquer</button>
                <a th:href="@{/instruments}" class="btn btn-secondary"><span>↺</span> Réinitialiser</a>
            </div>
        </form>

        <!-- Action -->
        <div style="text-align:right; margin-bottom: 1rem;">
            <a th:href="@{/instruments/new}" class="btn btn-primary">
                <span>➕</span> Nouvel instrument
            </a>
        </div>

        <!-- Liste -->
        <div th:if="${instruments.isEmpty()}" class="card empty">
            <span class="empty-emoji">🎶</span>
            <p class="empty-text">Aucun instrument trouvé avec ces critères</p>
        </div>

        <div th:unless="${instruments.isEmpty()}" class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>🆔</th>
                    <th>Nom</th>
                    <th>Famille</th>
                    <th>Disponibilité</th>
                    <th style="text-align:right;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="i : ${instruments}">
                    <td th:text="${i.id}">1</td>
                    <td><strong th:text="${i.nom}">Nom</strong></td>
                    <td>
                        <span class="badge"
                              th:classappend="${i.famille == 'Cordes' ? 'pink' :
                                              (i.famille == 'Vents' ? 'info' :
                                              (i.famille == 'Percussions' ? 'warn' : 'purple'))}"
                              th:text="${i.famille}">Famille</span>
                    </td>
                    <td>
                        <span th:if="${i.disponibilite}" class="badge success">✅ Disponible</span>
                        <span th:unless="${i.disponibilite}" class="badge danger">🚫 Indisponible</span>
                    </td>
                    <td style="text-align:right;">
                        <div class="btn-group" style="justify-content:flex-end;">
                            <form th:action="@{'/instruments/' + ${i.id} + '/toggle'}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-warn" title="Basculer la disponibilité">
                                    🔁
                                </button>
                            </form>
                            <a th:href="@{'/instruments/' + ${i.id} + '/edit'}" class="btn btn-sm btn-secondary">✏️</a>
                            <form th:action="@{'/instruments/' + ${i.id} + '/delete'}" method="post" style="display:inline;"
                                  onsubmit="return confirm('Supprimer cet instrument ?');">
                                <button type="submit" class="btn btn-sm btn-danger">🗑️</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

</body>
</html>
