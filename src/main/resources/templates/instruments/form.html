<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: pageHead('Instrument')}"></head>
<body>

<div class="layout">
    <nav th:replace="~{fragments/layout :: navbar('instruments')}"></nav>

    <main class="container">

        <div class="page-header">
            <h1>
                <span th:if="${isEdit}">✏️ Modifier l'instrument</span>
                <span th:unless="${isEdit}">✨ Nouvel instrument</span>
            </h1>
            <p class="subtitle">Renseignez les informations ci-dessous</p>
        </div>

        <form class="form-card" th:action="@{/instruments/save}" th:object="${instrument}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div class="form-grid">
                <div class="form-group full">
                    <label for="nom"><span>🎵</span> Nom de l'instrument</label>
                    <input type="text" id="nom" th:field="*{nom}" placeholder="Ex: Violon, Piano, Trompette..."/>
                    <div class="field-error" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
                </div>

                <div class="form-group">
                    <label for="famille"><span>🎯</span> Famille</label>
                    <select id="famille" th:field="*{famille}">
                        <option value="">-- Choisir une famille --</option>
                        <option value="Cordes">🎻 Cordes</option>
                        <option value="Vents">🎺 Vents</option>
                        <option value="Percussions">🥁 Percussions</option>
                        <option value="Claviers">🎹 Claviers</option>
                    </select>
                    <div class="field-error" th:if="${#fields.hasErrors('famille')}" th:errors="*{famille}"></div>
                </div>

                <div class="form-group">
                    <label><span>📦</span> Disponibilité</label>
                    <div class="checkbox-wrap">
                        <input type="checkbox" id="disponibilite" th:field="*{disponibilite}"/>
                        <label for="disponibilite" style="cursor:pointer;">
                            ✅ Disponible pour les cours
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/instruments}" class="btn btn-secondary"><span>↩️</span> Annuler</a>
                <button type="submit" class="btn btn-primary">
                    <span th:if="${isEdit}">💾 Mettre à jour</span>
                    <span th:unless="${isEdit}">✨ Créer</span>
                </button>
            </div>
        </form>

    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

</body>
</html>
